<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Job Application Form</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      padding: 40px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    .form-container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      font-size: 14px;
    }
    input[type="text"], input[type="email"], input[type="tel"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    input[type="text"]:focus, input[type="email"]:focus, input[type="tel"]:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .button-group {
      margin-top: 25px;
    }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h1>Apply for Software Engineer Intern</h1>
    <form id="job-app-form" onsubmit="event.preventDefault(); alert('Form submitted!');">
      <div class="form-group">
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" placeholder="John" required>
      </div>

      <div class="form-group">
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" placeholder="Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" required>
      </div>

      <div class="form-group">
        <label for="linkedin">LinkedIn Profile URL</label>
        <input type="text" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/username">
      </div>

      <div class="form-group">
        <label for="github">GitHub Profile URL</label>
        <input type="text" id="github" name="github" placeholder="https://github.com/username">
      </div>

      <div class="form-group">
        <label for="portfolio">Portfolio Website</label>
        <input type="text" id="portfolio" name="portfolio" placeholder="https://yourwebsite.com">
      </div>

      <div class="form-group">
        <label for="university">University / School Name</label>
        <input type="text" id="university" name="university" placeholder="Stanford University">
      </div>

      <div class="form-group">
        <label for="graduation_year">Graduation Year</label>
        <input type="text" id="graduation_year" name="graduation_year" placeholder="2026">
      </div>

      <div class="form-group">
        <label for="cgpa">GPA / CGPA</label>
        <input type="text" id="cgpa" name="cgpa" placeholder="3.8">
      </div>

      <div class="form-group">
        <label>Why should we hire you for this role?</label>
        <div>
          <textarea name="why_hire" placeholder="Enter text ..." rows="4" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-size: 14px;"></textarea>
        </div>
      </div>

      <div class="form-group">
        <label>Share your GitHub profile, portfolio, and links to 1-2 projects you have personally built, and explain exactly what you built yourself.</label>
        <div>
          <textarea name="projects_details" placeholder="Enter text ..." rows="4" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-size: 14px;"></textarea>
        </div>
      </div>

      <div class="button-group">
        <button type="submit">Submit Application</button>
      </div>
    </form>
  </div>

</body>
</html>
